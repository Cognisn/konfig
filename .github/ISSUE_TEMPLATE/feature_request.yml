name: Feature Request
description: Suggest a new feature or enhancement
labels: [enhancement]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature. Please describe what you'd like.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve? What's the use case?
      placeholder: I'm trying to ... but currently I have to ...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How do you think this should work? Include API examples if possible.
      placeholder: |
        settings.get("key", validate=int)
        # or
        secrets.rotate("api_key")
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of Konfig does this relate to?
      options:
        - Settings
        - Secrets
        - Logging
        - AppContext
        - Platform Paths
        - New Component
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative approaches you've considered.

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other relevant information.
